name: SpaceKatDriver
options:
  bundleIdPrefix: com.spacekat
  deploymentTarget:
    macOS: "12.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: SpaceKat Driver
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    LSUIElement: YES
    INFOPLIST_FILE: SpaceKatDriver/Info.plist
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: © 2026 SpaceKat Mac Driver
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: 1,2

targets:
  SpaceKatDriver:
    type: application
    platform: macOS
    sources:
      - path: SpaceKatDriver
        excludes:
          - "**/*.swift"
      - path: Sources
        type: folder
      - path: Resources
        type: folder
    settings:
      base:
        INFOPLIST_FILE: SpaceKatDriver/Info.plist
        INFOPLIST_KEY_LSUIElement: YES
    dependencies:
      - sdk: IOKit.framework
      - sdk: CoreBluetooth.framework
      - sdk: GameController.framework
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
      - sdk: Foundation.framework

  SpaceKatDriverTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpaceKatDriverTests
    settings:
      base:
        INFOPLIST_FILE: SpaceKatDriverTests/Info.plist

schemes:
  SpaceKatDriver:
    build:
      targets:
        SpaceKatDriver: all
        SpaceKatDriverTests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SpaceKatDriverTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
